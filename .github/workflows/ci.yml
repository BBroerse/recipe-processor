name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yml'
              - '.github/workflows/**'
              - 'migrations/**'
            docker:
              - 'Dockerfile'
              - 'docker-compose.yml'
              - '.dockerignore'

  lint:
    name: Lint
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  security:
    name: Security
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install security tools
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run gosec
        run: gosec ./...

      - name: Run govulncheck
        run: govulncheck ./... || true
        continue-on-error: true

  test-unit:
    name: Unit Tests
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run unit tests
        run: go test -short -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Check coverage
        run: |
          total=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${total}%"
          echo "## Test Coverage: ${total}%" >> $GITHUB_STEP_SUMMARY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  test-integration:
    name: Integration Tests
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d testdb"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run integration tests
        run: go test -race -count=1 -run "Integration|Repository|EventLog" ./...
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test
          DB_PASSWORD: test
          DB_NAME: testdb
          DB_SSLMODE: disable

  test-e2e:
    name: E2E Tests
    needs: [changes, test-unit, test-integration]
    if: |
      always() &&
      needs.changes.outputs.code == 'true' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run E2E tests
        run: go test -race -count=1 -run "E2E" ./internal/e2e/...

  build:
    name: Build
    needs: [changes, lint, security, test-unit, test-integration, test-e2e]
    if: |
      always() &&
      needs.changes.outputs.code == 'true' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binary
        run: CGO_ENABLED=0 go build -o api ./cmd/api

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-binary
          path: api

  docker:
    name: Docker Build
    needs: [changes, build]
    if: |
      always() &&
      (needs.changes.outputs.code == 'true' || needs.changes.outputs.docker == 'true') &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image tag
        id: img
        run: echo "tag=ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:${{ steps.meta.outputs.version }}" | tr '[:upper:]' '[:lower:]' >> "$GITHUB_OUTPUT"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.img.outputs.tag }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Test Docker image
        run: |
          set -euo pipefail

          # Helper: on any failure, dump API logs and exit
          cleanup() {
            echo "::group::API container logs"
            docker logs test-api 2>&1 || true
            echo "::endgroup::"
          }
          trap cleanup EXIT

          # ── Start PostgreSQL ──────────────────────────────────────
          docker network create test-net
          docker run -d --name test-pg --network test-net \
            -e POSTGRES_DB=recipes -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=test \
            postgres:16-alpine

          # Wait for PostgreSQL to be fully ready (init cycle: start → create DB → stop → restart)
          # pg_isready can succeed before the restart, so we verify with an actual query
          for i in $(seq 1 30); do
            if docker exec test-pg psql -U postgres -d recipes -c "SELECT 1" >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            sleep 1
          done

          # ── Start the API container ───────────────────────────────
          docker run -d --name test-api --network test-net -p 8080:8080 \
            -e DB_HOST=test-pg -e DB_PORT=5432 -e DB_USER=postgres \
            -e DB_PASSWORD=test -e DB_NAME=recipes -e DB_SSLMODE=disable \
            -e OLLAMA_URL=http://localhost:11434 \
            ${{ steps.img.outputs.tag }}

          # Wait for the API to be ready
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
              echo "API is ready"
              break
            fi
            if [ "$i" -eq 10 ]; then
              echo "::error::API failed to start within 20 seconds"
              exit 1
            fi
            sleep 2
          done

          # ── 1. Health check: verify response body ─────────────────
          echo "── Step 1: Health check (response body) ──"
          HEALTH=$(curl -sf http://localhost:8080/health)
          echo "$HEALTH" | jq .
          echo "$HEALTH" | jq -e '.status == "ok"' >/dev/null
          echo "✓ Health check passed — status is 'ok'"

          # ── 2. POST /recipes: create a recipe ─────────────────────
          echo ""
          echo "── Step 2: POST /recipes ──"
          RESP=$(curl -s -w "\n%{http_code}" -X POST http://localhost:8080/recipes \
            -H "Content-Type: application/json" \
            -d '{"text":"Mix flour and water. Knead for 10 minutes. Bake at 200C for 30 minutes."}')
          BODY=$(echo "$RESP" | sed '$d')
          CODE=$(echo "$RESP" | tail -1)
          echo "Status: $CODE"
          echo "$BODY" | jq .

          if [ "$CODE" != "202" ]; then
            echo "::error::Expected 202, got $CODE"
            exit 1
          fi

          RECIPE_ID=$(echo "$BODY" | jq -r '.id')
          if [ -z "$RECIPE_ID" ] || [ "$RECIPE_ID" = "null" ]; then
            echo "::error::Response missing 'id' field"
            exit 1
          fi
          echo "✓ Recipe created with id=$RECIPE_ID"

          # ── 3. GET /recipes/{id}: retrieve the recipe ─────────────
          echo ""
          echo "── Step 3: GET /recipes/$RECIPE_ID ──"
          RESP=$(curl -s -w "\n%{http_code}" http://localhost:8080/recipes/"$RECIPE_ID")
          BODY=$(echo "$RESP" | sed '$d')
          CODE=$(echo "$RESP" | tail -1)
          echo "Status: $CODE"
          echo "$BODY" | jq .

          if [ "$CODE" != "200" ]; then
            echo "::error::Expected 200, got $CODE"
            exit 1
          fi

          # Verify required fields exist (id and status)
          echo "$BODY" | jq -e '.id' >/dev/null
          echo "$BODY" | jq -e '.status' >/dev/null

          STATUS=$(echo "$BODY" | jq -r '.status')
          echo "✓ Recipe retrieved — status=$STATUS"

          # ── 4. POST /recipes with empty text: expect 400 ──────────
          echo ""
          echo "── Step 4: POST /recipes (empty text — expect 400) ──"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:8080/recipes \
            -H "Content-Type: application/json" \
            -d '{"text":""}')
          echo "Status: $CODE"

          if [ "$CODE" != "400" ]; then
            echo "::error::Expected 400 for empty text, got $CODE"
            exit 1
          fi
          echo "✓ Empty text correctly rejected with 400"

          # ── All smoke tests passed ────────────────────────────────
          echo ""
          echo "══════════════════════════════════════════"
          echo "  All smoke tests passed ✓"
          echo "══════════════════════════════════════════"
