run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    - typecheck
    - bodyclose
    - contextcheck
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - nilerr
    - prealloc
    - revive
    - unconvert
    - unparam
    - wastedassign

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    enable-all: true
    disable:
      - fieldalignment
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

issues:
  exclude-dirs:
    - migrations
  exclude-rules:
    - path: eventbus\.go
      linters:
        - contextcheck
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
