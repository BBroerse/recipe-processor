version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - bodyclose
    - contextcheck
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - nilerr
    - prealloc
    - revive
    - unconvert
    - unparam
    - wastedassign

  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
    revive:
      rules:
        - name: exported
          arguments:
            - "checkPrivateReceivers"
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance

  exclusions:
    paths:
      - migrations
    rules:
      - path: eventbus\.go
        linters:
          - contextcheck
      - path: _test\.go
        linters:
          - errcheck
          - gocritic
