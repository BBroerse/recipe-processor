services:
  api:
    build: .
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    environment:
      - ENV=${ENV:-development}
      - PORT=${PORT:-8080}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD is required}
      - DB_NAME=${DB_NAME:-recipes}
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-tinyllama}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-recipes}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    ports:
      - "127.0.0.1:${DB_EXPOSE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 2s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  # Pulls the configured model before the API starts
  ollama-pull:
    image: ollama/ollama:latest
    entrypoint: ["sh", "-c", "until ollama pull ${OLLAMA_MODEL:-tinyllama}; do sleep 2; done"]
    environment:
      - OLLAMA_HOST=ollama:11434
    depends_on:
      - ollama

volumes:
  postgres_data:
  ollama_data:
